apiVersion: batch/v1
kind: Job
metadata:
  name: orchestra-agent-job
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: orchestra
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestra-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: orchestra
    spec:
      restartPolicy: Never
      serviceAccountName: orchestra-agent
      containers:
        - name: agent
          image: orchestra-agent:latest
          env:
            - name: REPO_URL
              value: ""
            - name: BRANCH
              value: ""
            - name: BASE_BRANCH
              value: "main"
            - name: TASK_DEFINITION
              value: ""
            - name: CALLBACK_URL
              value: ""
            - name: AGENT_TYPE
              value: "claude-code"
            - name: MAX_RETRIES
              value: "3"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestra-agent-secrets
                  key: api-key
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestra-agent
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: orchestra
---
apiVersion: v1
kind: Secret
metadata:
  name: orchestra-agent-secrets
  namespace: orchestra
type: Opaque
stringData:
  api-key: "CHANGE_ME_IN_PRODUCTION"
