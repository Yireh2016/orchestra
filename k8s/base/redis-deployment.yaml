apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestra-redis
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: orchestra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestra-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestra-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: orchestra
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: orchestra-redis
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: orchestra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orchestra-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
