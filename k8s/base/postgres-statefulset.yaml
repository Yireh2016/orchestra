apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orchestra-postgres
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orchestra
spec:
  serviceName: orchestra-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestra-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestra-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: orchestra
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: orchestra
            - name: POSTGRES_USER
              value: orchestra
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orchestra-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - orchestra
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - orchestra
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestra-postgres
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orchestra
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: orchestra-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
apiVersion: v1
kind: Secret
metadata:
  name: orchestra-postgres-secret
  namespace: orchestra
type: Opaque
stringData:
  password: "CHANGE_ME_IN_PRODUCTION"
