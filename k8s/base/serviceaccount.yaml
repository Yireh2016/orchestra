apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestra-core
  namespace: orchestra
  labels:
    app.kubernetes.io/name: orchestra-core
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: orchestra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestra-agent-manager
  namespace: orchestra
  labels:
    app.kubernetes.io/part-of: orchestra
rules:
  # Allow the core service to create and manage agent Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Allow reading pod logs for agent output streaming
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestra-core-agent-manager
  namespace: orchestra
  labels:
    app.kubernetes.io/part-of: orchestra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orchestra-agent-manager
subjects:
  - kind: ServiceAccount
    name: orchestra-core
    namespace: orchestra
