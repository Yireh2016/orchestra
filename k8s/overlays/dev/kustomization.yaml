apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orchestra

resources:
  - ../../base

patches:
  # Scale down to single replicas for dev
  - target:
      kind: Deployment
      name: orchestra-core
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  - target:
      kind: Deployment
      name: orchestra-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi

  - target:
      kind: Deployment
      name: orchestra-redis
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi

  - target:
      kind: StatefulSet
      name: orchestra-postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

  # Dev-specific config
  - target:
      kind: ConfigMap
      name: orchestra-core-config
    patch: |
      - op: replace
        path: /data/NODE_ENV
        value: development
