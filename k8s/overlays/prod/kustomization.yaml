apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orchestra

resources:
  - ../../base

patches:
  # Scale up for production
  - target:
      kind: Deployment
      name: orchestra-core
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi

  - target:
      kind: Deployment
      name: orchestra-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi

  - target:
      kind: Deployment
      name: orchestra-redis
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: StatefulSet
      name: orchestra-postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi

  # Production config
  - target:
      kind: ConfigMap
      name: orchestra-core-config
    patch: |
      - op: replace
        path: /data/NODE_ENV
        value: production
